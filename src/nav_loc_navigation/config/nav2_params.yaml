# Map-less Nav2 params for Go2.
#
# This stack runs WITHOUT a map server or AMCL. There is no `map` frame:
# the localization stack (nav_loc_localization) only provides odom->base_link.
# Both costmaps therefore use `odom` as their global frame and run as rolling
# windows, and the global planner (Navfn) plans straight on the rolling
# global costmap. Click a "Nav2 Goal" in RViz (fixed frame = odom) and the
# dog drives there; cmd_vel_to_sport relays /cmd_vel to the sport API.

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 2.0
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      transform_tolerance: 0.3
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # Go2 机身约 0.70x0.31m，按对称矩形(以 base_link 为中心)近似，
      # 留腿摆动/安全裕度 -> 0.72x0.36m。外接半径约 0.40m。
      footprint: "[ [0.36, 0.18], [0.36, -0.18], [-0.36, -0.18], [-0.36, 0.18] ]"
      # 单线 2D 激光用 ObstacleLayer 而非 VoxelLayer：射线穿过即清除 2D 栅格，
      # 清障更彻底；VoxelLayer 是给 3D 用的，单线扫描下旧障碍清不掉、四周糊成
      # 一圈拖影(就是 RViz 里看到的"不更新")。与 global_costmap 保持一致。
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /front/scan_filter
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 外接半径约 0.40m + ~10cm 裕度 = 0.50（兼顾安全与钻缝能力）
        inflation_radius: 0.50

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      transform_tolerance: 0.5
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      # rolling_window=true：costmap 是【以机器人为中心、跟着机器人滚动】的窗口，
      # 机器人可无限远地一直移动，窗口只需覆盖前方一段路即可，不必铺满世界。
      # 用 30x30(跟随)而非 1000x1000(铺满)：后者每边1万格=1亿格/层，必然卡死。
      # odom 帧漂移下窗口也别太大，否则远处旧障碍累积拖影、清不掉。
      width: 30
      height: 30
      resolution: 0.10
      track_unknown_space: false
      # Go2 机身约 0.70x0.31m，按对称矩形(以 base_link 为中心)近似，
      # 留腿摆动/安全裕度 -> 0.72x0.36m。外接半径约 0.40m。
      footprint: "[ [0.36, 0.18], [0.36, -0.18], [-0.36, -0.18], [-0.36, 0.18] ]"
      # 单线 2D 激光用 ObstacleLayer 而非 VoxelLayer：射线穿过即清除 2D 栅格，
      # 清障更彻底；VoxelLayer 是给 3D 用的，单线扫描下容易残留旧障碍。
      # denoise_layer 夹在 obstacle 与 inflation 之间：删掉单线噪声激光留下的
      # 孤立/小簇噪点格(椒盐噪声)，再做膨胀，避免噪点被 inflation 放大成大块。
      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /front/scan_filter
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # 缩短量程：远处(16m)用噪声单线激光标障碍且清不干净，会留永久杂点。
          # 只标近处可靠障碍(4.5m)，清障范围(6m)略大于标记范围以保证能清掉。
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0

      # 去噪层：把 obstacle 层标出的格子里【孤立或小于 minimal_group_size 的连通簇】
      # 当作噪点清掉(8 邻接)。单线 HESAI 偶发的散点不会再积累成永久杂块。
      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: True
        minimal_group_size: 2
        group_connectivity_type: 8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 外接半径约 0.40m，inflation 取 0.40（0.60 过大，改小以便钻缝）
        inflation_radius: 0.40

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      # SmacPlanner2D：2D 任意角 A* + 平滑，适合 Go2(可原地转向，无转弯半径约束)。
      # 想换回 NavFn 时把 plugin 改回 "nav2_navfn_planner/NavfnPlanner" + tolerance/use_astar/allow_unknown 即可。
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5                      # 到不了精确目标时允许的最近距离(m)
      downsample_costmap: false           # 不降采样 costmap
      downsampling_factor: 1
      allow_unknown: true                 # 允许穿过未知区域(map-less rolling costmap 需要)
      max_iterations: 1000000             # A* 最大迭代(防卡死)
      max_on_approach_iterations: 1000    # 接近目标时的额外迭代
      max_planning_time: 2.0              # 单次规划超时(s)
      cost_travel_multiplier: 2.0         # 越大越避开高代价(贴障碍)区域
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [2.0, 0.3, 0.6]
    min_velocity: [-2.0, -0.3, -0.6]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
